name: Secret Leak Detection and Fix

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: Branch to scan and remediate
        required: true
        type: string
  push:
    branches:
      - 'demo/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-and-remediate-secrets:
    name: detect-and-remediate-secrets
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.inputs.branch_name || github.ref_name }}
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect and mask hardcoded secrets
        id: remediate
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          root = Path('.')
          ignore_dirs = {'.git', 'node_modules', 'dist', 'build', 'coverage'}
          allowed_suffixes = {'.ts', '.tsx', '.js', '.jsx', '.json', '.env', '.yaml', '.yml', '.properties', '.config'}

          patterns = [
              {
                  'name': 'AWS_ACCESS_KEY',
                  'regex': re.compile(r'AKIA[0-9A-Z]{16}'),
                  'replacement': lambda match: 'REDACTED_AWS_ACCESS_KEY'
              },
              {
                  'name': 'GENERIC_API_KEY',
                  'regex': re.compile(r'(?i)(\b(?:api[_-]?key|client[_-]?secret|access[_-]?token|secret|token)\b\s*[:=]\s*[\"\']?)([A-Za-z0-9_\-\/=+]{8,})([\"\']?)'),
                  'replacement': lambda match: f"{match.group(1)}REDACTED_API_KEY{match.group(3)}"
              },
              {
                  'name': 'PASSWORD_IN_CONFIG',
                  'regex': re.compile(r'(?i)(\b(?:password|passwd|pwd)\b\s*[:=]\s*[\"\']?)([^\"\'\s]{6,})([\"\']?)'),
                  'replacement': lambda match: f"{match.group(1)}REDACTED_PASSWORD{match.group(3)}"
              }
          ]

          findings = []
          changed_files = set()

          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              rel = path.relative_to(root)
              if any(part in ignore_dirs for part in rel.parts):
                  continue
              if path.name != '.env' and path.suffix.lower() not in allowed_suffixes:
                  continue

              try:
                  original = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError):
                  continue

              for item in patterns:
                  for match in item['regex'].finditer(original):
                      line_number = original.count('\n', 0, match.start()) + 1
                      findings.append({
                          'type': item['name'],
                          'file': rel.as_posix(),
                          'line': line_number
                      })
                      annotation = f"::warning file={rel.as_posix()},line={line_number},title={item['name']} detected::Potential {item['name']} detected in {rel.as_posix()}"
                      print(annotation)

              updated = original
              for item in patterns:
                  updated = item['regex'].sub(item['replacement'], updated)

              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed_files.add(rel.as_posix())

          report = {
              'target_branch': os.environ['TARGET_BRANCH'],
              'finding_count': len(findings),
              'files_changed': sorted(changed_files),
              'findings': findings,
          }

          Path('secret-remediation-report.json').write_text(json.dumps(report, indent=2), encoding='utf-8')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"remediated={'true' if changed_files else 'false'}\n")
              output.write(f"findings_count={len(findings)}\n")
              output.write(f"files_changed={len(changed_files)}\n")

          if findings:
              print('::warning::Potential hardcoded secrets were detected and remediation was attempted.')
          else:
              print('::warning::No hardcoded secrets were detected in the scanned branch.')
          PY

      - name: Create remediation branch
        id: branch
        if: steps.remediate.outputs.remediated == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sanitized=$(echo "$TARGET_BRANCH" | sed 's#[^A-Za-z0-9._/-]#-#g')
          remediation_branch="remediation/${sanitized}/run-${GITHUB_RUN_ID}"
          git checkout -b "$remediation_branch"
          echo "remediation_branch=$remediation_branch" >> "$GITHUB_OUTPUT"

      - name: Commit and push remediation changes
        if: steps.remediate.outputs.remediated == 'true'
        shell: bash
        env:
          REMEDIATION_BRANCH: ${{ steps.branch.outputs.remediation_branch }}
        run: |
          set -euo pipefail
          git add -u
          if git diff --cached --quiet; then
            echo "::error::Secret remediation found issues but did not produce file changes."
            exit 1
          fi
          git commit -m "chore: remediate detected hardcoded secrets"
          git push --set-upstream origin "$REMEDIATION_BRANCH"

      - name: Open pull request with remediation
        id: open_pr
        if: steps.remediate.outputs.remediated == 'true'
        uses: actions/github-script@v7
        env:
          REMEDIATION_BRANCH: ${{ steps.branch.outputs.remediation_branch }}
          FINDINGS_COUNT: ${{ steps.remediate.outputs.findings_count }}
          FILES_CHANGED: ${{ steps.remediate.outputs.files_changed }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('secret-remediation-report.json', 'utf8'));
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${process.env.REMEDIATION_BRANCH}`,
              base: process.env.TARGET_BRANCH
            });

            if (existing.data.length > 0) {
              core.setOutput('pr_url', existing.data[0].html_url);
              core.setOutput('pr_number', String(existing.data[0].number));
              return;
            }

            const findings = report.findings.slice(0, 50)
              .map((item) => `- **${item.type}** in \`${item.file}\` at line ${item.line}`)
              .join('\n');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Automated Remediation] Mask detected secrets on ${process.env.TARGET_BRANCH}`,
              head: process.env.REMEDIATION_BRANCH,
              base: process.env.TARGET_BRANCH,
              body: [
                '## Automated Secret Remediation',
                '',
                `This PR masks hardcoded secrets detected on \`${process.env.TARGET_BRANCH}\`.`,
                '',
                `- Findings remediated: **${process.env.FINDINGS_COUNT}**`,
                `- Files changed: **${process.env.FILES_CHANGED}**`,
                `- Triggered by: @${context.actor}`,
                '',
                '### Findings',
                findings || '- No findings recorded.'
              ].join('\n')
            });

            core.setOutput('pr_url', pr.data.html_url);
            core.setOutput('pr_number', String(pr.data.number));

      - name: Summarize remediation workflow
        if: always()
        shell: bash
        env:
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          REMEDIATED: ${{ steps.remediate.outputs.remediated }}
          FINDINGS_COUNT: ${{ steps.remediate.outputs.findings_count }}
          FILES_CHANGED: ${{ steps.remediate.outputs.files_changed }}
          REMEDIATION_BRANCH: ${{ steps.branch.outputs.remediation_branch }}
          PR_URL: ${{ steps.open_pr.outputs.pr_url }}
        run: |
          {
            echo "## Secret remediation summary"
            echo ""
            echo "- Target branch: \`${TARGET_BRANCH}\`"
            echo "- Findings detected: **${FINDINGS_COUNT:-0}**"
            echo "- Files updated: **${FILES_CHANGED:-0}**"
            if [[ "$REMEDIATED" == "true" ]]; then
              echo "- Remediation branch: \`${REMEDIATION_BRANCH}\`"
              echo "- Pull request: ${PR_URL}"
            else
              echo "- No hardcoded secrets required remediation."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
