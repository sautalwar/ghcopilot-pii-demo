name: "🌐 DAST Security Scan (OWASP ZAP)"

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan (must be accessible from runner)'
        required: true
        default: 'https://juice-shop.herokuapp.com'
      scan_type:
        description: 'Scan type'
        required: true
        default: 'baseline'
        type: choice
        options:
          - 'baseline'
          - 'full'
          - 'api'
  push:
    branches: ['demo/dast-*']

jobs:
  dast-zap:
    name: "OWASP ZAP ${{ github.event.inputs.scan_type || 'baseline' }} Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: "🌐 ZAP Baseline Scan"
        if: github.event.inputs.scan_type == 'baseline' || github.event.inputs.scan_type == ''
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: ${{ github.event.inputs.target_url || 'https://juice-shop.herokuapp.com' }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: true
          fail_action: false
          artifact_name: 'zap-baseline-report'
          
      - name: "🌐 ZAP Full Scan"
        if: github.event.inputs.scan_type == 'full'
        uses: zaproxy/action-full-scan@v0.11.0
        with:
          target: ${{ github.event.inputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: true
          fail_action: false
          artifact_name: 'zap-full-report'
          
      - name: "🌐 ZAP API Scan"
        if: github.event.inputs.scan_type == 'api'
        uses: zaproxy/action-api-scan@v0.8.0
        with:
          target: ${{ github.event.inputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-f openapi'
          allow_issue_writing: true
          fail_action: false
          artifact_name: 'zap-api-report'
      
      - name: "📝 DAST Summary"
        if: always()
        run: |
          echo "## 🌐 DAST Scan Results (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`${{ github.event.inputs.target_url || 'https://juice-shop.herokuapp.com' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Type:** ${{ github.event.inputs.scan_type || 'baseline' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scanner:** OWASP ZAP (zaproxy)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What is DAST?" >> $GITHUB_STEP_SUMMARY
          echo "DAST (Dynamic Application Security Testing) tests a **running application**" >> $GITHUB_STEP_SUMMARY
          echo "from the outside — like a hacker would. Unlike SAST (which reads source code)," >> $GITHUB_STEP_SUMMARY
          echo "DAST finds runtime vulnerabilities like:" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-Site Scripting (XSS)" >> $GITHUB_STEP_SUMMARY
          echo "- SQL Injection (via HTTP)" >> $GITHUB_STEP_SUMMARY
          echo "- Authentication bypass" >> $GITHUB_STEP_SUMMARY
          echo "- Insecure headers/cookies" >> $GITHUB_STEP_SUMMARY
          echo "- CSRF vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub vs GitLab for DAST" >> $GITHUB_STEP_SUMMARY
          echo "| Feature | GitLab | GitHub |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| DAST Tool | Built-in (proprietary) | OWASP ZAP (open-source, industry standard) |" >> $GITHUB_STEP_SUMMARY
          echo "| Customization | Limited to GitLab's UI | Full YAML control, any scanner |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Types | Baseline, Full | Baseline, Full, API, Ajax |" >> $GITHUB_STEP_SUMMARY
          echo "| Cost | Included in Ultimate (\$99/user) | Free (open-source ZAP) |" >> $GITHUB_STEP_SUMMARY
          echo "| Lock-in | GitLab only | Any CI/CD, any scanner |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 **Advantage**: GitHub's approach lets you use the industry-standard OWASP ZAP or ANY DAST tool. GitLab locks you into their proprietary scanner." >> $GITHUB_STEP_SUMMARY
